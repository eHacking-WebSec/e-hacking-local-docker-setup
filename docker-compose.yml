services:

  step-ca:
    image: docker.io/smallstep/step-ca:latest
    environment:
      - DOCKER_STEPCA_INIT_NAME=eHacking CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT=true
      - DOCKER_STEPCA_INIT_ACME=true
    links:
      # These links are necessary for ACME HTTP Challenge to work properly
      - traefik:${HOST1}
      - traefik:${HOST2}
      - traefik:${IDP_HOST}
      - traefik:${JSON_HOST}
      - traefik:${REST_HOST}
      - traefik:${RS_HOST}
      - traefik:${XML_HOST}
      - traefik:${SPA_HOST}
      - traefik:${WEBSEC_HOST}
      - traefik:${SOAP_HOST}
      - traefik:${SP_HOST}
      - traefik:${ATTACKER_HOST}
    volumes:
      - step-ca:/home/step
    networks:
      - ehacking
    expose:
      - "9000"


  traefik:
    image: docker.io/traefik:3.1
    command:
      - '--api.dashboard=true'
      - '--api.insecure=true'
      - '--certificatesresolvers.stepca.acme.caserver=https://step-ca:9000/acme/acme/directory'
      - '--certificatesresolvers.stepca.acme.certificatesduration=24'
      - '--certificatesresolvers.stepca.acme.email=admin@${HOST1}'
      - '--certificatesresolvers.stepca.acme.httpchallenge.entrypoint=stepca'
      - '--certificatesresolvers.stepca.acme.httpchallenge=true'
      - '--certificatesresolvers.stepca.acme.storage=/etc/traefik/acme/stepca-acme.json'
      - '--entrypoints.stepca.address=:80'
      # - '--entrypoints.web.address=:${PORT_HTTP}' # we already use 80 for stepca
      - '--entrypoints.websecure.address=:${PORT_HTTPS}'
      - '--entrypoints.websecure.http.tls=true'
      - '--providers.docker=true'
    environment:
      - LEGO_CA_CERTIFICATES=/etc/step-ca/certs/root_ca.crt
    ports:
      - '${PORT_HTTP}:${PORT_HTTP}'
      - '${PORT_HTTPS}:${PORT_HTTPS}'
    expose:
      - 80 # step-ca HTTP Challenge
    volumes:
      - step-ca:/etc/step-ca/:ro'
      - traefik_acme:/etc/traefik/acme
      - '/var/run/docker.sock:/var/run/docker.sock'
    networks:
      - ehacking
    labels:
      - 'traefik.http.routers.dashboard.rule=(PathPrefix(`/api`) || PathPrefix(`/dashboard`))'
      - 'traefik.http.routers.dashboard.priority=99999'
      - 'traefik.http.routers.dashboard.service=api@internal'

  app:
    image: ${DOCKER_REGISTRY}/ehacking:${VARIANT}
    pull_policy: always
    depends_on:
      step-ca:
        required: true
        condition: service_started
      couchdb:
        required: true
        condition: service_started
    env_file:
      - .env
    environment:
      - ATTACKER_URL=https://${ATTACKER_HOST}:${PORT_HTTPS}
      - IDP_URL=https://${IDP_HOST}:${PORT_HTTPS}
      - RS_URL=https://${RS_HOST}:${PORT_HTTPS}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.all-in-one.entrypoints=websecure'
      - 'traefik.http.routers.all-in-one.rule=( Host(`${HOST1}`) || Host(`${HOST2}`) || Host(`${IDP_HOST}`) || Host(`${JSON_HOST}`) || Host(`${REST_HOST}`) || Host(`${RS_HOST}`) || Host(`${SOAP_HOST}`) || Host(`${SP_HOST}`) || Host(`${SPA_HOST}`) || Host(`${WEBSEC_HOST}`) || Host(`${XML_HOST}`) )'
      - 'traefik.http.routers.all-in-one.tls=true'
      - 'traefik.http.routers.all-in-one.tls.certresolver=stepca'
      - 'traefik.http.services.all-in-one.loadbalancer.server.port=80'
      - 'traefik.http.routers.all-in-one.priority=1000'
    networks:
      - ehacking

  axis2-flag:
    image: ${DOCKER_REGISTRY}/axis2-flag
    depends_on:
      step-ca:
        required: true
        condition: service_started
    environment:
      - FLAG_WSADDRESSING_SPOOFING_TO=${FLAG_WSADDRESSING_SPOOFING_TO:-FLAG{soap_wsaddressing_secret_dummy}}
    expose:
      - "8080"
    networks:
      - soap-internal
    develop:
      watch:
        - action: rebuild
          path: ./soap-sec/internal-axis2-services

  axis2-fake:
    image: ${DOCKER_REGISTRY}/axis2-flag
    depends_on:
      step-ca:
        required: true
        condition: service_started
    environment:
      - FLAG_WSADDRESSING_SPOOFING_TO=${FLAG_WSADDRESSING_SPOOFING_TO:-FLAG{soap_wsaddressing_secret_dummy}}
    expose:
      - "8080"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.axis2-fake.entrypoints=websecure'
      - 'traefik.http.routers.axis2-fake.rule=(Host(`${SOAP_HOST}`) && PathPrefix(`/axis2/services/`))'
      - 'traefik.http.routers.axis2-fake.tls=true'
      - 'traefik.http.routers.axis2-fake.tls.certresolver=stepca'
      - 'traefik.http.services.axis2-fake.loadbalancer.server.port=8080'
    networks:
      - ehacking
    
  couchdb:
    image: docker.io/couchdb:latest
    ports:
      - "5984"
    environment:
      COUCHDB_USER: "root"
      COUCHDB_PASSWORD: "super_secure"
    networks:
      - ehacking
    labels:
      - 'traefik.enable=true'

  attacker-echo:
    image: docker.io/mendhak/http-https-echo:31
    depends_on:
      - step-ca
    restart: unless-stopped
    networks:
      - ehacking
    expose:
      - 8080
    labels:
      - 'traefik.http.routers.attacker-echo.priority=2147482647'
      - "traefik.enable=true"
      - "traefik.http.routers.attacker-echo.entrypoints=websecure"
      - "traefik.http.routers.attacker-echo.rule=( Host(`echo.${ATTACKER_HOST}`) )"
      - 'traefik.http.routers.attacker-echo.tls.certresolver=stepca'
      - "traefik.http.services.attacker-echo.loadbalancer.server.port=8080"

  attacker-apache:
    image: docker.io/php:8.1-apache
    depends_on:
      - step-ca
    restart: unless-stopped
    volumes:
      - '${HOME}/${ATTACKER_HOST}/:/var/www/html:ro'
    networks:
      - ehacking
    expose:
      - "80"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.attacker-apache.entrypoints=websecure'
      - 'traefik.http.routers.attacker-apache.priority=1'
      - 'traefik.http.routers.attacker-apache.rule=( Host(`${ATTACKER_HOST}`) || HostRegexp(`^.+\\.${ATTACKER_HOST}$`) )'
      - 'traefik.http.routers.attacker-apache.tls.certresolver=stepca'
      - 'traefik.http.routers.attacker-apache.tls=true'
      - 'traefik.http.services.attacker-apache.loadbalancer.server.port=80'


networks:
  ehacking:
  soap-internal:

volumes:
  couchdb:
  step-ca:
  traefik_acme: