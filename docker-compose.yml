services:

  # Local TLS, the simple way: one init makes a CA + one server cert; nothing else.
  # No ACME, no CA server. tls-init creates a self-signed root CA and signs ONE leaf
  # covering every public host + the catcher and its *.attacker.localhost salt
  # subdomains. The root is published by ca-server (trusted by the laptop + the SP's
  # JVM); the leaf is served by Traefik's file provider. Idempotent (skips if present).
  tls-init:
    image: docker.io/smallstep/step-cli:latest
    # The fresh ca/tls volumes are root-owned; write the material as root (output is 0644).
    user: root
    volumes:
      - ca:/ca      # published root cert (root_ca.crt)
      - tls:/tls    # the server cert Traefik serves (tls.crt + tls.key)
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -s /tls/tls.crt ] && [ -s /ca/root_ca.crt ]; then
          echo "TLS material already present — nothing to do."; exit 0
        fi
        # The root CA key is ephemeral (/tmp, never persisted). To rotate, wipe
        # the ca + tls volumes and re-run. Separate volumes (not subpaths) because
        # podman's docker-API ignores volume subpath.
        step certificate create "eHacking Local CA" /ca/root_ca.crt /tmp/root_ca.key \
          --profile root-ca --no-password --insecure --not-after 87600h --force
        step certificate create eHacking /tls/tls.crt /tls/tls.key \
          --profile leaf --ca /ca/root_ca.crt --ca-key /tmp/root_ca.key \
          --no-password --insecure --not-after 8760h --force \
          --san "${HOST1}" --san "${HOST2}" --san "${IDP_HOST}" --san "${JSON_HOST}" \
          --san "${REST_HOST}" --san "${RS_HOST}" --san "${SOAP_HOST}" --san "${SP_HOST}" \
          --san "${SPA_HOST}" --san "${WEBSEC_HOST}" --san "${XML_HOST}" \
          --san "${ATTACKER_HOST}" --san "*.${ATTACKER_HOST}"
        chmod 0644 /ca/root_ca.crt /tls/tls.crt /tls/tls.key
        echo "CA + TLS cert created."
    networks:
      - ehacking
    restart: on-failure

  # Reverse proxy. Serves the single stack cert from tls-init via the file provider
  # (no ACME). The web entrypoint (:80) carries plain-HTTP ca.localhost so the laptop
  # can fetch the CA root before it trusts TLS.
  traefik:
    image: docker.io/traefik:3
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
    command:
      - '--api.dashboard=true'
      - '--api.insecure=true'
      - '--entrypoints.web.address=:${PORT_HTTP}'
      - '--entrypoints.websecure.address=:${PORT_HTTPS}'
      - '--entrypoints.websecure.http.tls=true'
      - '--providers.docker=true'
      # Scope the provider to THIS project, else another stack's same-named
      # routers (all-in-one, catcher) collide and break routing.
      - '--providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME}`)'
      # File provider serves the single stack TLS cert (all hosts + the catcher
      # *.attacker.localhost subdomains).
      - '--providers.file.directory=/etc/traefik/dynamic'
      - '--providers.file.watch=true'
    ports:
      - '${PORT_HTTP}:${PORT_HTTP}'
      - '${PORT_HTTPS}:${PORT_HTTPS}'
    volumes:
      # The stack TLS cert (written by tls-init) + the file-provider config.
      - tls:/etc/traefik/certs:ro
      - './traefik/dynamic:/etc/traefik/dynamic:ro'
      # Container socket; bin/runtime-env.sh swaps in the podman socket (rootless, :Z) under Podman.
      - '${TRAEFIK_SOCK_MOUNT:-/var/run/docker.sock:/var/run/docker.sock}'
    networks:
      ehacking:
        # Every public host resolves to Traefik in-network so modules/bot/catcher
        # can reach each other (and the catcher-as-mIdP) by FQDN.
        aliases:
          - ${HOST1}
          - ${HOST2}
          - ${IDP_HOST}
          - ${JSON_HOST}
          - ${REST_HOST}
          - ${RS_HOST}
          - ${SOAP_HOST}
          - ${SP_HOST}
          - ${SPA_HOST}
          - ${WEBSEC_HOST}
          - ${XML_HOST}
          - ${ATTACKER_HOST}
    labels:
      - 'traefik.http.routers.dashboard.rule=(PathPrefix(`/api`) || PathPrefix(`/dashboard`))'
      - 'traefik.http.routers.dashboard.priority=99999'
      - 'traefik.http.routers.dashboard.service=api@internal'
    restart: on-failure

  # Serves the CA root over plain HTTP at http://ca.localhost/root_ca.crt (plain HTTP
  # solves trusting-the-cert-before-you-can-fetch-it). The Ansible provisioner pulls
  # the root from here. The ca volume holds only the root cert; the root key is ephemeral.
  ca-server:
    image: docker.io/nginx:alpine
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
    volumes:
      - ca:/source:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /source/*.crt /usr/share/nginx/html/ 2>/dev/null || true
        chmod a+r /usr/share/nginx/html/*.crt 2>/dev/null || true
        exec nginx -g 'daemon off;'
    networks:
      - ehacking
    expose:
      - "80"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.ca-server.entrypoints=web'
      - 'traefik.http.routers.ca-server.rule=Host(`ca.localhost`)'
      - 'traefik.http.services.ca-server.loadbalancer.server.port=80'
    restart: on-failure

  # All-in-one image: every WildFly module (root/json/oidc/saml/rest/web/xml/soap)
  # in ONE container — fewer resources than N instances. Flags stay at dummy
  # defaults (every laptop is identical).
  app:
    image: ${DOCKER_REGISTRY}/ehacking:${VARIANT}
    # Default pull_policy (missing): offline laptops use the pre-loaded image;
    # `just update` refreshes online.
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
      couchdb:
        required: true
        condition: service_started
      catcher:
        required: false
        condition: service_started
      victim-bot:
        required: false
        condition: service_started
    env_file:
      - .env
    environment:
      - ATTACKER_URL=https://${ATTACKER_HOST}:${PORT_HTTPS}
      - CATCHER_HOST=${ATTACKER_HOST}
      - IDP_URL=https://${IDP_HOST}:${PORT_HTTPS}
      - RS_URL=https://${RS_HOST}:${PORT_HTTPS}
      # BotProxyServlet relays /__bot-proxy/* here (keeps the bot same-origin).
      - BOT_URL=http://victim-bot:1338
    # CA root (RO) so the SP JVM can TLS-validate a catcher wired as a malicious IdP.
    volumes:
      - ca:/run/step-ca:ro
    # Import the CA root into the JVM truststore before boot (else OIDC mIdP
    # attacks fail PKIX), then add-runtime-users.sh → standalone.sh.
    entrypoint:
      - /bin/sh
      - -c
      - |
        keytool -importcert -noprompt \
          -keystore "$$JAVA_HOME/lib/security/cacerts" \
          -storepass changeit \
          -alias ehacking-step-ca \
          -file /run/step-ca/root_ca.crt >/dev/null 2>&1 || true
        exec /usr/local/bin/add-runtime-users.sh \
          /opt/jboss/wildfly/bin/standalone.sh \
          -b 0.0.0.0 -bmanagement 0.0.0.0 \
          -Djboss.http.port=80 -Djboss.https.port=443
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.all-in-one.entrypoints=websecure'
      - 'traefik.http.routers.all-in-one.rule=( Host(`${HOST1}`) || Host(`${HOST2}`) || Host(`${IDP_HOST}`) || Host(`${JSON_HOST}`) || Host(`${REST_HOST}`) || Host(`${RS_HOST}`) || Host(`${SOAP_HOST}`) || Host(`${SP_HOST}`) || Host(`${SPA_HOST}`) || Host(`${WEBSEC_HOST}`) || Host(`${XML_HOST}`) )'
      - 'traefik.http.routers.all-in-one.tls=true'
      - 'traefik.http.services.all-in-one.loadbalancer.server.port=80'
      - 'traefik.http.routers.all-in-one.priority=1000'
    # Sibling hosts resolve to Traefik via its network aliases — no per-service links.
    networks:
      - ehacking
    extra_hosts:
      - "malicious.com:172.20.0.1" # malicious-IdP target → gateway → Traefik
    restart: on-failure

  # Catcher — attacker/exfil target on the bare attacker host + its salt subdomains
  # (*.attacker.localhost). Open signup is fine offline; instructor/superuser use the
  # well-known "student" password.
  catcher:
    image: ${DOCKER_REGISTRY}/catcher:latest
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - PORT=3000
      # Catcher keys salt-resolution on CATCHER_HOST → must equal the host Traefik
      # serves it on; derive from ATTACKER_HOST so they can't drift.
      - CATCHER_HOST=${ATTACKER_HOST}
      - CATCHER_DB_PATH=/data/registry.db
      - CATCHER_PUBLIC_PORT=${PORT_HTTPS}  # host-visible port for {{base_url}} in mocks
      # Single-user: one implicit instance on the bare host. Unset/false → standard
      # multi-tenant salt subdomains (now routable + TLS-valid via the wildcard SAN).
      - CATCHER_SINGLE_USER=${CATCHER_SINGLE_USER:-false}
      - CATCHER_OPEN_SIGNUP=true
      - CATCHER_INSTRUCTOR_PASSWORD=${CATCHER_INSTRUCTOR_PASSWORD:-student}
      - CATCHER_SUPERUSER_PASSWORD=${CATCHER_SUPERUSER_PASSWORD:-student}
    volumes:
      - catcher-data:/data
    networks:
      - ehacking
    expose:
      - 3000
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.catcher.entrypoints=websecure'
      - 'traefik.http.routers.catcher.rule=( Host(`${ATTACKER_HOST}`) || HostRegexp(`^.+\.${ATTACKER_HOST}$`) )'
      - 'traefik.http.routers.catcher.tls=true'
      # Beat the dashboard router's host-less PathPrefix(`/api`) so /api mocks work.
      - 'traefik.http.routers.catcher.priority=100000'
      - 'traefik.http.services.catcher.loadbalancer.server.port=3000'
    restart: on-failure

  # Victim-bot — headless honest user (oemmes) for OIDC bot attacks (covert-redirect,
  # 307, TRC). No resource limits offline (a cap would OOM-kill it mid-attack);
  # `init: true` reaps Puppeteer/Firefox children. Reached only via the SP's
  # BotProxyServlet, so no traefik labels.
  victim-bot:
    image: ${DOCKER_REGISTRY}/victim-bot:latest
    init: true
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - PORT=1338
      - BOT_REPORT_RATE_LIMIT=${BOT_REPORT_RATE_LIMIT:-60}
      - OEMMES_USERNAME=oemmes
      - USER307_USERNAME=user307
      - BOT_OIDC_LOGIN_URL=https://${IDP_HOST}:${PORT_HTTPS}${BASE_PATH_OIDC_IDP}/login.xhtml
      - BOT_OIDC_LOGGED_IN_PROBE=https://${IDP_HOST}:${PORT_HTTPS}${BASE_PATH_OIDC_IDP}/index.xhtml
      - BOT_OIDC_ALLOWED_ORIGINS=https://${SP_HOST}:${PORT_HTTPS},https://${SPA_HOST}:${PORT_HTTPS},https://${IDP_HOST}:${PORT_HTTPS},https://${ATTACKER_HOST}:${PORT_HTTPS}
      - BOT_OIDC_ALLOWED_ATTACKS=secure:or-1,secure:or-2,secure:or-3,secure:or-4,secure:redir-2,secure:cr-1,secure:xss-1,trc-1:secure,trc-2:secure
    expose:
      - 1338
    networks:
      - ehacking
    restart: on-failure

  # SOAP backend — real flag service (isolated network) + public decoy.
  axis2-flag:
    image: ${DOCKER_REGISTRY}/axis2-flag
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
    environment:
      - FLAG_WSADDRESSING_SPOOFING_TO=${FLAG_WSADDRESSING_SPOOFING_TO:-FLAG{soap_wsaddressing_secret_dummy}}
    expose:
      - "8080"
    networks:
      - soap-internal
    restart: on-failure

  axis2-fake:
    image: ${DOCKER_REGISTRY}/axis2-flag
    depends_on:
      tls-init:
        required: true
        condition: service_completed_successfully
    environment:
      - FLAG_WSADDRESSING_SPOOFING_TO=${FLAG_WSADDRESSING_SPOOFING_TO:-FLAG{soap_wsaddressing_secret_dummy}}
    expose:
      - "8080"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.axis2-fake.entrypoints=websecure'
      - 'traefik.http.routers.axis2-fake.rule=(Host(`${SOAP_HOST}`) && PathPrefix(`/axis2/services/`))'
      - 'traefik.http.routers.axis2-fake.priority=10000'
      - 'traefik.http.routers.axis2-fake.tls=true'
      - 'traefik.http.services.axis2-fake.loadbalancer.server.port=8080'
    networks:
      - ehacking
    restart: on-failure

  # CouchDB backend for the REST module.
  couchdb:
    image: docker.io/couchdb:latest
    environment:
      COUCHDB_USER: "root"
      COUCHDB_PASSWORD: "super_secure"
    expose:
      - "5984"
    networks:
      - ehacking
    restart: on-failure


networks:
  ehacking:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
  soap-internal:

volumes:
  couchdb:
  ca:
  tls:
  catcher-data:
